name: CI/CD — Jatham Platform

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]

# Cancel in-progress runs of the same workflow on the same branch
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  NODE_VERSION: "20"

# ─────────────────────────────────────────────────────────────────────────────
jobs:

  # ── Job 1: Backend Tests ───────────────────────────────────────────────────
  test-backend:
    name: Backend — Unit Tests
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Node.js ${{ env.NODE_VERSION }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: "npm"
          cache-dependency-path: backend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Run unit tests
        run: npm test
        env:
          NODE_ENV: test
          # Tests use mongodb-memory-server — no real DB needed
          JWT_ACCESS_SECRET: test_access_secret_at_least_32_chars_long
          JWT_REFRESH_SECRET: test_refresh_secret_at_least_32_chars_long

      - name: Run security audit
        run: npm audit --audit-level=high
        # Fail pipeline if any HIGH or CRITICAL vulnerabilities are found

  # ── Job 2: Frontend Build ─────────────────────────────────────────────────
  build-frontend:
    name: Frontend — Build & Lint
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Node.js ${{ env.NODE_VERSION }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: "npm"
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint
        continue-on-error: true # Lint warnings don't block deploy

      - name: Build production bundle
        run: npm run build
        env:
          # Point to production API for build — Vercel will override via env vars
          VITE_API_URL: ${{ secrets.VITE_API_URL }}

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: frontend-dist
          path: frontend/dist
          retention-days: 1

  # ── Job 3: Deploy Backend to Railway ─────────────────────────────────────
  deploy-backend:
    name: Deploy Backend → Railway
    runs-on: ubuntu-latest
    needs: [test-backend] # Only deploy if tests pass
    if: github.ref == 'refs/heads/master' && github.event_name == 'push'

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install Railway CLI
        run: npm install -g @railway/cli

      - name: Deploy to Railway
        run: railway up --service ${{ secrets.RAILWAY_SERVICE_ID }} --detach
        working-directory: backend
        env:
          RAILWAY_TOKEN: ${{ secrets.RAILWAY_TOKEN }}

      - name: Wait for deployment & health check
        run: |
          echo "Waiting for Railway deployment to stabilize..."
          sleep 20
          BACKEND_URL="${{ secrets.BACKEND_HEALTH_URL }}"
          echo "Checking health at: $BACKEND_URL"
          for i in {1..5}; do
            STATUS=$(curl -s -o /dev/null -w "%{http_code}" "$BACKEND_URL" --max-time 10 || echo "000")
            echo "Attempt $i: HTTP $STATUS"
            if [ "$STATUS" = "200" ]; then
              echo "✅ Backend is healthy!"
              exit 0
            fi
            sleep 10
          done
          echo "❌ Health check failed after 5 attempts"
          exit 1

  # ── Job 4: Deploy Frontend to Vercel ─────────────────────────────────────
  deploy-frontend:
    name: Deploy Frontend → Vercel
    runs-on: ubuntu-latest
    needs: [build-frontend] # Only deploy if build passes
    if: github.ref == 'refs/heads/master' && github.event_name == 'push'

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install Vercel CLI
        run: npm install -g vercel@latest

      - name: Pull Vercel environment
        run: vercel pull --yes --environment=production --token=${{ secrets.VERCEL_TOKEN }}
        working-directory: frontend

      - name: Build for Vercel
        run: vercel build --prod --token=${{ secrets.VERCEL_TOKEN }}
        working-directory: frontend

      - name: Deploy to Vercel
        run: |
          DEPLOY_URL=$(vercel deploy --prebuilt --prod --token=${{ secrets.VERCEL_TOKEN }})
          echo "Deployed to: $DEPLOY_URL"
          echo "DEPLOY_URL=$DEPLOY_URL" >> $GITHUB_ENV
        working-directory: frontend

      - name: Post deployment URL to summary
        run: |
          echo "### ✅ Frontend Deployed" >> $GITHUB_STEP_SUMMARY
          echo "**URL:** ${{ env.DEPLOY_URL }}" >> $GITHUB_STEP_SUMMARY

  # ── Job 5: PR Preview Deploy ──────────────────────────────────────────────
  preview-frontend:
    name: Preview Frontend → Vercel (PR)
    runs-on: ubuntu-latest
    needs: [build-frontend]
    if: github.event_name == 'pull_request'

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install Vercel CLI
        run: npm install -g vercel@latest

      - name: Pull Vercel environment
        run: vercel pull --yes --environment=preview --token=${{ secrets.VERCEL_TOKEN }}
        working-directory: frontend

      - name: Build preview
        run: vercel build --token=${{ secrets.VERCEL_TOKEN }}
        working-directory: frontend

      - name: Deploy preview
        run: |
          PREVIEW_URL=$(vercel deploy --prebuilt --token=${{ secrets.VERCEL_TOKEN }})
          echo "PREVIEW_URL=$PREVIEW_URL" >> $GITHUB_ENV
          echo "Preview: $PREVIEW_URL"
        working-directory: frontend

      - name: Comment preview URL on PR
        uses: actions/github-script@v7
        with:
          script: |
            const { data: comments } = await github.rest.issues.listComments({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
            });
            const botComment = comments.find(c => c.user.type === 'Bot' && c.body.includes('🔍 Preview Deploy'));
            const body = `### 🔍 Preview Deploy\n\n**Frontend Preview:** ${{ env.PREVIEW_URL }}\n\n*Commit: ${{ github.sha }}*`;
            if (botComment) {
              await github.rest.issues.updateComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                comment_id: botComment.id,
                body
              });
            } else {
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: context.issue.number,
                body
              });
            }
